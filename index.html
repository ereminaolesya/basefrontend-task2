<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<section class="gradient-block" data-test-id="gradient-block">
    <div class="container">
        <span class="badge">AD</span>
        <span class="badge2">Sponsored</span>
    </div>

    <h2 class="gradient-heading" data-test-id="gradient-heading">
        Launch stunning gradients in seconds
    </h2>

    <p class="description">
        Generate beautiful linear gradients for backgrounds and
        typography. Preview, tweak, and paste into your next project—no
        guesswork.
    </p>

    <div class="buttons">
        <!--        <a href="http://38.180.216.143/prod/linear-gradient-advertisement/reference-solution/">-->
        <button class="btn-primary" data-test-id="btn-primary">Get started
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0.5625 5.8125H11.0625M11.0625 5.8125L5.8125 0.5625M11.0625 5.8125L5.8125 11.0625" stroke="#171717" stroke-width="1.125" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <!--        </a>-->
        <button class="btn-secondary">Preview gradients</button>
    </div>

    <div class="divider"></div>

    <span class="postscript">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12.5625 0.5625L4.3125 8.8125L0.5625 5.0625" stroke="white" stroke-opacity="0.9" stroke-width="1.125" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Background and text gradients
    </span>
</section>

</body>
</html>
